# This is a Databricks asset bundle definition for dab_project.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: dab_project
  uuid: c7622aea-b347-4ac2-97ab-c2d8d5b8f9e5

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-0efcfc5e-695c.cloud.databricks.com
    variables:
      catalog: renewable_prod
      schema: dev
  prod:
    mode: production
    workspace:
      host: https://dbc-0efcfc5e-695c.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/jeevanprabhakaran19@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/jeevanprabhakaran19@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: renewable_prod
      schema: prod
    permissions:
      - user_name: jeevanprabhakaran19@gmail.com
        level: CAN_MANAGE
